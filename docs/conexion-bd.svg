<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 582">
<rect x="0" y="0" width="1080" height="582" rx="12" fill="#0d1117"/>
<rect x="0" y="0" width="1080" height="44" rx="12" fill="#161b22"/>
<rect x="0" y="28" width="1080" height="16" fill="#161b22"/>
<circle cx="24" cy="22" r="6.5" fill="#ff5f56"/><circle cx="46" cy="22" r="6.5" fill="#ffbd2e"/><circle cx="68" cy="22" r="6.5" fill="#27c93f"/>
<text x="540.0" y="27" text-anchor="middle" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#e6edf3">Conexión a la base de datos · Kulto Rescata  —  js/auth.js</text>
<text x="56" y="84" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="14.5" font-weight="700" fill="#f0a35e">①  Cada página HTML carga la librería oficial de Supabase (CDN):</text>
<text x="56" y="118" font-family="Consolas, 'DejaVu Sans Mono', 'Courier New', monospace" font-size="15" xml:space="preserve"><tspan fill="#e6edf3">&lt;script src=</tspan><tspan fill="#a5d6ff">"https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"</tspan><tspan fill="#e6edf3">&gt;&lt;/script&gt;</tspan></text>
<text x="56" y="161" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="14.5" font-weight="700" fill="#f0a35e">②  En js/auth.js se crea la conexión al proyecto (el cliente sb):</text>
<text x="56" y="195" font-family="Consolas, 'DejaVu Sans Mono', 'Courier New', monospace" font-size="15" xml:space="preserve"><tspan fill="#ff7b72">const </tspan><tspan fill="#e6edf3">SUPABASE_URL = </tspan><tspan fill="#a5d6ff">'https://tntqfevzuzczxvallbsj.supabase.co'</tspan><tspan fill="#e6edf3">;</tspan></text>
<text x="56" y="222" font-family="Consolas, 'DejaVu Sans Mono', 'Courier New', monospace" font-size="15" xml:space="preserve"><tspan fill="#ff7b72">const </tspan><tspan fill="#e6edf3">SUPABASE_ANON_KEY =</tspan></text>
<text x="56" y="249" font-family="Consolas, 'DejaVu Sans Mono', 'Courier New', monospace" font-size="15" xml:space="preserve"><tspan fill="#a5d6ff">  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9 . . .';</tspan></text>
<text x="56" y="276" font-family="Consolas, 'DejaVu Sans Mono', 'Courier New', monospace" font-size="15" xml:space="preserve"><tspan fill="#ff7b72">var </tspan><tspan fill="#e6edf3">sb = </tspan><tspan fill="#e6edf3">window</tspan><tspan fill="#e6edf3">.supabase</tspan></text>
<text x="56" y="303" font-family="Consolas, 'DejaVu Sans Mono', 'Courier New', monospace" font-size="15" xml:space="preserve"><tspan fill="#e6edf3">  ? window</tspan><tspan fill="#e6edf3">.supabase.</tspan><tspan fill="#d2a8ff">createClient</tspan><tspan fill="#e6edf3">(SUPABASE_URL, SUPABASE_ANON_KEY)</tspan></text>
<text x="56" y="330" font-family="Consolas, 'DejaVu Sans Mono', 'Courier New', monospace" font-size="15" xml:space="preserve"><tspan fill="#e6edf3">  : </tspan><tspan fill="#ff7b72">null</tspan><tspan fill="#e6edf3">;</tspan></text>
<text x="56" y="373" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="14.5" font-weight="700" fill="#f0a35e">③  Con "sb" conectado se ejecutan las consultas SQL a la base de datos:</text>
<text x="56" y="407" font-family="Consolas, 'DejaVu Sans Mono', 'Courier New', monospace" font-size="15" xml:space="preserve"><tspan fill="#ff7b72">await </tspan><tspan fill="#e6edf3">sb.</tspan><tspan fill="#d2a8ff">from</tspan><tspan fill="#e6edf3">('pedidos').</tspan><tspan fill="#d2a8ff">select</tspan><tspan fill="#e6edf3">('*');</tspan><tspan fill="#8b949e">        // SELECT</tspan></text>
<text x="56" y="434" font-family="Consolas, 'DejaVu Sans Mono', 'Courier New', monospace" font-size="15" xml:space="preserve"><tspan fill="#ff7b72">await </tspan><tspan fill="#e6edf3">sb.</tspan><tspan fill="#d2a8ff">from</tspan><tspan fill="#e6edf3">('pedidos').</tspan><tspan fill="#d2a8ff">insert</tspan><tspan fill="#e6edf3">({ ... });</tspan><tspan fill="#8b949e">    // INSERT</tspan></text>
<text x="56" y="461" font-family="Consolas, 'DejaVu Sans Mono', 'Courier New', monospace" font-size="15" xml:space="preserve"><tspan fill="#ff7b72">await </tspan><tspan fill="#e6edf3">sb.</tspan><tspan fill="#d2a8ff">from</tspan><tspan fill="#e6edf3">('pedidos').</tspan><tspan fill="#d2a8ff">update</tspan><tspan fill="#e6edf3">({ ... });</tspan><tspan fill="#8b949e">   // UPDATE</tspan></text>
<rect x="0" y="504" width="1080" height="78" fill="#161b22"/>
<text x="56" y="534" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="13" fill="#8b949e">La clave <tspan font-family="Consolas, 'DejaVu Sans Mono', 'Courier New', monospace" fill="#a5d6ff">anon</tspan> es pública (viaja al navegador); los datos se protegen con RLS en la base de datos.</text>
<text x="56" y="556" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="13" fill="#8b949e">La URL y la clave salen del panel de Supabase → Project Settings → API.</text>
</svg>