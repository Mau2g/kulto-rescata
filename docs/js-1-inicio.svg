<text x="40" y="446" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="12.5" fill="#8b949e">Al cargar la pagina, el listener DOMContentLoaded arranca todo: contador, carrito, catalogo (destacados) y pedidos.</text>
<text x="40" y="468" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="12.5" fill="#8b949e">alternarMenu abre el menu en movil; abrirModal / cerrarModal controlan la ventana de confirmacion.</text>
