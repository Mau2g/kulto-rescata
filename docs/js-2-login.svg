<text x="40" y="782" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="12.5" fill="#8b949e">El formulario (onsubmit) llama a iniciarLogin: valida el correo y la contrasena, e inicia sesion contra Supabase.</text>
<text x="40" y="804" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="12.5" fill="#8b949e">Si las credenciales fallan, muestra el error traducido; si funciona, abre el modal y redirige al inicio.</text>
